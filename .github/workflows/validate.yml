name: Validate Project Structure

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Check required files and folders
        run: |
          echo "Verificando archivos y carpetas..."

          [ -f app.py ] || (echo "Falta app.py" && exit 1)
          [ -f requirements.txt ] || (echo "Falta requirements.txt" && exit 1)

          [ -d templates ] || (echo "Falta carpeta templates/" && exit 1)
          [ -d static ] || (echo "Falta carpeta static/" && exit 1)
          [ -d data ] || (echo "Falta carpeta data/" && exit 1)

      - name: Validate JSON files
        run: |
          echo "Validando archivos JSON..."

          python -m json.tool data/users.json > /dev/null || (echo "Error en users.json" && exit 1)
          python -m json.tool data/events.json > /dev/null || (echo "Error en events.json" && exit 1)
          python -m json.tool data/orders.json > /dev/null || (echo "Error en orders.json" && exit 1)

